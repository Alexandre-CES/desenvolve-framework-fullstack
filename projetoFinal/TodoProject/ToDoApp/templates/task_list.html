{% extends 'base.html' %}

{% block content %}

<div class="content">
  <h2>Minhas Tarefas</h2>
  <a href="{% url 'task_create' %}" class="btn btn-primary mb-2">Nova Tarefa</a>
  <ul class="list-group">
    {% for task in tasks %}
      <li class="list-group-item d-flex justify-content-between align-items-center ">
        {{ task.title }}
        <span>
          <a href="{% url 'task_update' task.pk %}" class="btn btn-sm btn-warning">Editar</a>
          <a href="{% url 'task_delete' task.pk %}" class="btn btn-sm btn-danger">Excluir</a>
        </span>
      </li>
    {% endfor %}
  </ul>
</div>

{% endblock %}
