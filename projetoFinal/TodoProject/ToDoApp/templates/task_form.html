{% extends 'base.html' %}

{% block title %} Nova Tarefa {% endblock %}

{% block content %}
<h2>
  {% if form.instance.pk %}
    Editar Tarefa 
  {% else %}
    Nova Tarefa
  {% endif %}
</h2>

<form action="" method="post">
  {% csrf_token %}
  {{form.as_p}}
  <button type="submit" class="btn btn-success">
    {% if form.instance.pk %}
      Atualizar
    {% else %}
      Criar
    {% endif %}
  </button>
</form>
{% endblock %}
