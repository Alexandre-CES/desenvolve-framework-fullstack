{% extends 'base.html' %}

{% block title %} Login - ToDo List{% endblock %}

{% block content %}

<div class="text-start mt-5">
  <h2>Login</h2>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Entrar</button>
  </form>

  <p class="mt-3">Não tem uma conta? <a href="{% url 'register' %}">Registrar</a></p>
</div>

{% endblock %}
