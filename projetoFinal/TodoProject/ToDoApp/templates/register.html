{% extends 'base.html' %}

{% block title %} Registrar - ToDo List{% endblock %}

{% block content %}

<div class="text-start mt-5">
  <h2>Registrar</h2>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Cadastrar</button>
  </form>

  <p class="mt-3">Já tem uma conta? <a href="{% url 'login' %}">Logar</a></p>
</div>

{% endblock %}
